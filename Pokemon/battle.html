<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Pokémon Kampspil</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./Images/Pokemon-Logo-color.png">
</head>
<body>
    <header>
        <img src="./Images/Pokemon-Logo-Custom.png" alt="Error! Image not found.">
    </header>
    <div id="pokedex-container" style="display: none; background: #eee; padding: 20px;">
        <button onclick="togglePokedex(false)">CLOSE POKÉDEX</button>
        <div id="pokedex-grid" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>
    <div id="start-menu" class="start-overlay">
            <h2>Chose your Starter Pokémon!</h2>
            <div class="start-options">
                <button onclick="chooseStarter(1)">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur"><br>
                    BULBASAUR
                </button>
                <button onclick="chooseStarter(4)">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="Charmander"><br>
                    CHARMANDER
                </button>
                <button onclick="chooseStarter(7)">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="Squirtle"><br>
                    SQUIRTLE
                </button>
            </div>
        </div>
    <div id="game-container">
        <div id="opponent-section" class="info-box">
            <div class="pokemon-header">
                <span id="opponent-name" style="font-weight: bold; font-size: 22px;">...</span>
                <span id="opponent-status" class="status-badge"></span>
                <span class="level-text">LV<span id="opponent-level">1</span></span>
            </div>
            <div class="hp-bar"><div id="opponent-hp-fill"></div></div>
        </div>

        <div id="opponent-sprite-container" class="sprite-container">
            <img id="opponent-sprite" src="" alt="">
        </div>
        
        <div id="player-sprite-container" class="sprite-container">
            <img id="player-sprite" src="" alt="">
        </div>
        
        <div id="player-section" class="info-box">
            <div class="pokemon-header">
                <span id="player-name" style="font-weight: bold; font-size: 22px;">Loading...</span>
                <span id="player-status" class="status-badge"></span>
                <span class="level-text">LV<span id="player-level">1</span></span>
            </div>
            <div class="hp-bar"><div id="player-hp-fill"></div></div>
            <p>HP: <span id="player-hp-text">0/0</span></p>
            <div class="xp-bar"><div id="player-xp-fill"></div></div>
            <div id="move-buttons"></div>
        </div>
    </div>
    <div id="battle-menu-container">
        <div id="battle-log">
            <p id="log-text">click the button to start the fight!</p>
        </div>

        <div id="menu-actions">
            <button type="button" class="menu-button" id="button-1" onclick="handleMenuClick(1)">FIGHT</button>
            <button type="button" class="menu-button" id="button-2" onclick="handleMenuClick(2)">BAG</button>
            <button type="button" class="menu-button" id="button-3" onclick="handleMenuClick(3)">POKÉMON</button>
            <button type="button" class="menu-button" id="button-4" onclick="handleMenuClick(4)">RUN</button>
            <button type="button" id="button-back" style="display: none; background-color: #f44336; 
            color: white;" id="button-5" onclick="handleBackClick()">BACK</button>
        </div>
    </div>

    <script src="./JavaScript/pokemon.js"></script>
    <footer>
        <h4>&#169; 2026 Daniel Stegmann Henriksen</h4>
    </footer>
</body>
